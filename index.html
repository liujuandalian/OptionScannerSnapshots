<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Scanner Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e1e5eb; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #00d4ff; margin-bottom: 30px; font-size: 2em; }
        .section { background: #151b2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a3555; }
        .section h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.3em; border-bottom: 2px solid #2a3555; padding-bottom: 10px; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .metric { background: #1a2332; padding: 15px; border-radius: 8px; border-left: 4px solid #00d4ff; }
        .metric label { display: block; color: #8892a8; font-size: 0.85em; margin-bottom: 5px; }
        .metric .value { font-size: 1.5em; font-weight: bold; color: #00d4ff; }
        .metric .value.negative { color: #ff4757; }
        .metric .value.positive { color: #2ed573; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a3555; }
        th { background: #1a2332; color: #00d4ff; font-weight: 600; }
        tr:hover { background: #1a2332; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
        .badge.put { background: #ff4757; color: white; }
        .badge.call { background: #2ed573; color: white; }
        .badge.neutral { background: #ffa502; color: white; }
        .loading { text-align: center; color: #8892a8; padding: 40px; }
        .error { background: #ff4757; color: white; padding: 15px; border-radius: 8px; margin: 10px 0; }
        #last-update { text-align: center; color: #8892a8; margin-top: 30px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Options Scanner Dashboard</h1>

        <!-- SPX 指标 -->
        <div class="section">
            <h2>📈 SPX 盘中指标</h2>
            <div class="metric-grid" id="spx-metrics">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- OI 快照分析 -->
        <div class="section">
            <h2>📊 OI 快照分析 (2026-06-06)</h2>
            <div id="oi-analysis">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 期权流 TOP10 -->
        <div class="section">
            <h2>🔥 期权流 TOP10</h2>
            <div id="alerts-top10">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 完整 Alerts 表格 -->
        <div class="section">
            <h2>⚡ 完整 Alerts (最近 100 条)</h2>
            <div id="alerts-table">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="last-update">最后更新: <span id="update-time">—</span></div>
    </div>

    <script>
        const REPO_BASE = 'https://liujuandalian.github.io/OptionScannerSnapshots';

        async function fetchJSON(path) {
            const url = `${REPO_BASE}/${path}?t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Failed to load ${path}`);
            return resp.json();
        }

        function formatNumber(num) {
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        // 加载 SPX 数据
        async function loadSPX() {
            try {
                const data = await fetchJSON('SPXalerts/spx_eod_20260605.json');
                const html = `
                    <div class="metric">
                        <label>SPX 收盘价</label>
                        <div class="value">${data.closing_price || '—'}</div>
                    </div>
                    <div class="metric">
                        <label>净 Delta 敞口</label>
                        <div class="value ${data.net_delta > 0 ? 'positive' : 'negative'}">${data.net_delta || '—'}</div>
                    </div>
                    <div class="metric">
                        <label>0DTE 信号方向</label>
                        <div class="value">${data.signal_direction || '—'}</div>
                    </div>
                `;
                document.getElementById('spx-metrics').innerHTML = html;
            } catch (e) {
                document.getElementById('spx-metrics').innerHTML = `<div class="error">SPX 数据加载失败: ${e.message}</div>`;
            }
        }

        // 加载 OI 分析
        async function loadOI() {
            try {
                const data = await fetchJSON('oi_snapshots/oi_snapshot_20260606.json');
                const summary = data.summary;
                
                let html = `
                    <div class="metric-grid">
                        <div class="metric">
                            <label>总标的数</label>
                            <div class="value">${summary.total_tickers}</div>
                        </div>
                        <div class="metric">
                            <label>Put 主导</label>
                            <div class="value negative">${summary.put_dominant} 只</div>
                        </div>
                        <div class="metric">
                            <label>Call 主导</label>
                            <div class="value positive">${summary.call_dominant} 只</div>
                        </div>
                        <div class="metric">
                            <label>市场情绪</label>
                            <div class="value">${summary.market_sentiment}</div>
                        </div>
                    </div>
                    <h3 style="margin-top: 20px; color: #ff4757;">🔴 Put 激增 TOP 3</h3>
                    <table>
                        <tr><th>标的</th><th>Put OI 增量</th></tr>
                        ${summary.top_put_surge.map(t => `
                            <tr>
                                <td><strong>${t.ticker}</strong></td>
                                <td class="negative">+${formatNumber(t.put_oi_add)}</td>
                            </tr>
                        `).join('')}
                    </table>
                    <h3 style="margin-top: 20px; color: #2ed573;">🟢 Call 激增 TOP 3</h3>
                    <table>
                        <tr><th>标的</th><th>Call OI 增量</th></tr>
                        ${summary.top_call_surge.map(t => `
                            <tr>
                                <td><strong>${t.ticker}</strong></td>
                                <td class="positive">+${formatNumber(t.call_oi_add)}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
                
                document.getElementById('oi-analysis').innerHTML = html;
            } catch (e) {
                document.getElementById('oi-analysis').innerHTML = `<div class="error">OI 数据加载失败: ${e.message}</div>`;
            }
        }

        // 加载 Alerts TOP10
        async function loadAlertsTop10() {
            try {
                const data = await fetchJSON('alerts/alerts_20260605_slim.json');
                const alerts = data.slice(0, 10);
                
                let html = `
                    <table>
                        <tr>
                            <th>时间</th>
                            <th>标的</th>
                            <th>类型</th>
                            <th>方向</th>
                            <th>权利金</th>
                        </tr>
                        ${alerts.map(a => `
                            <tr>
                                <td>${new Date(a.timestamp).toLocaleTimeString('zh-CN')}</td>
                                <td><strong>${a.ticker}</strong></td>
                                <td><span class="badge ${a.signal_type.includes('PUT') ? 'put' : 'call'}">${a.signal_type}</span></td>
                                <td class="${a.direction === 'BULLISH' ? 'positive' : 'negative'}">${a.direction}</td>
                                <td>$${formatNumber(a.est_premium)}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
                
                document.getElementById('alerts-top10').innerHTML = html;
            } catch (e) {
                document.getElementById('alerts-top10').innerHTML = `<div class="error">Alerts 数据加载失败: ${e.message}</div>`;
            }
        }

        // 加载完整 Alerts 表格
        async function loadAlertsTable() {
            try {
                const data = await fetchJSON('alerts/alerts_20260605_slim.json');
                const alerts = data.slice(0, 100);
                
                let html = `
                    <table>
                        <tr>
                            <th>时间</th>
                            <th>标的</th>
                            <th>类型</th>
                            <th>行权价</th>
                            <th>到期日</th>
                            <th>Volume</th>
                            <th>OI</th>
                            <th>权利金</th>
                        </tr>
                        ${alerts.map(a => `
                            <tr>
                                <td>${new Date(a.timestamp).toLocaleString('zh-CN')}</td>
                                <td><strong>${a.ticker}</strong></td>
                                <td><span class="badge ${a.option_type === 'PUT' ? 'put' : 'call'}">${a.option_type}</span></td>
                                <td>${a.strike}</td>
                                <td>${a.expiry}</td>
                                <td>${formatNumber(a.volume)}</td>
                                <td>${formatNumber(a.open_interest)}</td>
                                <td>$${formatNumber(a.est_premium)}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
                
                document.getElementById('alerts-table').innerHTML = html;
            } catch (e) {
                document.getElementById('alerts-table').innerHTML = `<div class="error">Alerts 数据加载失败: ${e.message}</div>`;
            }
        }

        // 主函数
        async function main() {
            await Promise.all([
                loadSPX(),
                loadOI(),
                loadAlertsTop10(),
                loadAlertsTable()
            ]);
            
            document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
        }

        main();
    </script>
</body>
</html>
