<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>SPX 期权监控仪表板</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 :root {
 --bg-primary: #0a0e17;
 --bg-card: #151b2e;
 --bg-metric: #1a2332;
 --border: #2a3555;
 --accent: #00d4ff;
 --bull: #2ed573;
 --bear: #ff4757;
 --neutral: #ffa502;
 --text: #e1e5eb;
 --text-dim: #8892a8;
 }
 body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text); padding: 20px; line-height: 1.6; }
 .container { max-width: 1600px; margin: 0 auto; }

 /* Header */
 header { text-align: center; margin-bottom: 30px; }
 header h1 { color: var(--accent); font-size: 2.2em; margin-bottom: 5px; }
 header .subtitle { color: var(--text-dim); font-size: 0.9em; }

 /* Section Cards */
 .section { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
 .section h2 { color: var(--accent); margin-bottom: 15px; font-size: 1.2em; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
 .section h2 .icon { font-size: 1.2em; }

 /* Metric Grid */
 .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
 .metric { background: var(--bg-metric); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
 .metric label { display: block; color: var(--text-dim); font-size: 0.85em; margin-bottom: 5px; }
 .metric .value { font-size: 1.5em; font-weight: bold; color: var(--accent); }
 .metric .value.bull { color: var(--bull); }
 .metric .value.bear { color: var(--bear); }
 .metric .value.neutral { color: var(--neutral); }

 /* Market Sentiment Row */
 .sentiment-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
 .sentiment-card { background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); text-align: center; }
 .sentiment-card h3 { color: var(--accent); font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
 .sentiment-card .gauge { position: relative; width: 100%; height: 60px; background: var(--bg-metric); border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
 .sentiment-card .gauge-bar { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: bold; transition: width 0.5s ease; }
 .sentiment-card .gauge-bar.bull { background: linear-gradient(90deg, var(--bull), #1fa05a); }
 .sentiment-card .gauge-bar.bear { background: linear-gradient(90deg, var(--bear), #cc3a47); }
 .sentiment-card .gauge-bar.neutral { background: linear-gradient(90deg, var(--neutral), #cc8800); }
 .sentiment-card .description { color: var(--text-dim); font-size: 0.85em; min-height: 40px; }

 /* Historical Data Table */
 .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
 .history-table th, .history-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
 .history-table th { background: var(--bg-metric); color: var(--accent); font-weight: 600; }
 .history-table td { font-size: 0.95em; }
 .history-table tr:hover { background: var(--bg-metric); }

 /* Data Tables */
 table { width: 100%; border-collapse: collapse; margin-top: 15px; }
 th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
 th { background: var(--bg-metric); color: var(--accent); font-weight: 600; }
 tr:hover { background: var(--bg-metric); }

 /* Badges */
 .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; font-weight: 600; }
 .badge.put { background: var(--bear); color: white; }
 .badge.call { background: var(--bull); color: white; }
 .badge.bull { background: var(--bull); color: white; }
 .badge.bear { background: var(--bear); color: white; }
 .badge.neutral { background: var(--neutral); color: white; }

 /* Loading / Error States */
 .loading { text-align: center; color: var(--text-dim); padding: 30px; }
 .error { background: rgba(255,71,87,0.1); color: var(--bear); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,71,87,0.3); }
 .success { background: rgba(46,213,115,0.1); color: var(--bull); padding: 15px; border-radius: 8px; border: 1px solid rgba(46,213,115,0.3); }

 /* Alert Cards */
 .alert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
 .alert-card { background: var(--bg-metric); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
 .alert-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
 .alert-card .ticker { font-size: 1.2em; font-weight: bold; color: var(--accent); }
 .alert-card .details { font-size: 0.9em; color: var(--text-dim); }
 .alert-card .premium { font-size: 1.1em; font-weight: bold; }

 /* 2-column layout */
 .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
 @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

 /* Footer */
 footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.85em; }
 footer a { color: var(--accent); text-decoration: none; }
 footer a:hover { text-decoration: underline; }

 /* Data Update Info */
 .update-info { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--bg-metric); border-radius: 8px; margin-bottom: 15px; }
 .update-info .date { color: var(--text-dim); font-size: 0.85em; }

 /* Sub-sections */
 .sub-section { margin-top: 20px; }
 .sub-section h3 { color: var(--accent); font-size: 1em; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid var(--accent); }

 /* Manual Data Notice */
 .manual-notice { background: rgba(255,165,2,0.1); border: 1px solid rgba(255,165,2,0.3); padding: 10px 15px; border-radius: 8px; color: var(--neutral); font-size: 0.85em; margin-bottom: 15px; }
 .manual-notice a { color: var(--accent); }
 </style>
</head>
